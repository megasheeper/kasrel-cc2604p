<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop Runway — Style & Shine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --gold: #e8c97a;
    --gold2: #f5e0a0;
    --pink: #f472b6;
    --violet: #a78bfa;
    --mint: #6ee7b7;
    --white: #f8f4ff;
    --muted: #6b6b8a;
    --border: rgba(232,201,122,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD */
  #starfield {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 60% 0%, #1a0a2e 0%, #0a0a12 60%);
  }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:.9} }

  /* LAYOUT */
  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  header {
    text-align: center; padding: 2rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .logo-tag {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px; opacity: 0.8;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 40%, var(--pink) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1; margin-bottom: 4px;
  }
  header p {
    font-size: 13px; color: var(--muted); letter-spacing: 1px;
    font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 18px;
  }

  /* IDOL SELECTOR */
  .idol-tabs {
    display: flex; justify-content: center; gap: 12px; padding: 1.2rem 1rem 0.5rem; flex-wrap: wrap;
  }
  .idol-tab {
    padding: 8px 20px; border-radius: 30px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .25s; letter-spacing: 0.5px;
  }
  .idol-tab.active {
    border-color: var(--gold); color: var(--gold);
    background: rgba(232,201,122,0.09);
    box-shadow: 0 0 18px rgba(232,201,122,0.15);
  }
  .idol-tab:hover:not(.active) { border-color: var(--muted); color: var(--white); }

  /* MAIN STAGE */
  .stage-area {
    display: flex; gap: 0; flex: 1;
    padding: 0.5rem 1.5rem 1rem; max-width: 1200px; margin: 0 auto; width: 100%;
  }

  /* RUNWAY */
  .runway-wrap {
    flex: 1; display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .runway {
    width: 340px; height: 580px; position: relative;
    background: linear-gradient(180deg, #1a0a2e 0%, #0f0f1f 50%, #18102e 100%);
    border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(167,139,250,0.12), inset 0 0 40px rgba(0,0,0,0.5);
  }

  /* Runway floor lines */
  .runway-floor {
    position: absolute; bottom: 0; left: 0; right: 0; height: 180px;
    overflow: hidden;
  }
  .runway-floor::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent, transparent 28px,
      rgba(232,201,122,0.07) 28px, rgba(232,201,122,0.07) 30px
    );
  }
  /* Perspective lines */
  .floor-line {
    position: absolute; bottom: 0; width: 1px; background: rgba(232,201,122,0.15);
    transform-origin: bottom center;
  }

  /* Stage lights */
  .stage-light {
    position: absolute; top: -20px; width: 120px; height: 260px;
    border-radius: 50%; opacity: 0.18; pointer-events: none;
    animation: lightSway 4s ease-in-out infinite;
  }
  .stage-light.left { left: 0; background: radial-gradient(ellipse, var(--violet) 0%, transparent 70%); animation-delay: -2s; }
  .stage-light.right { right: 0; background: radial-gradient(ellipse, var(--pink) 0%, transparent 70%); }
  @keyframes lightSway { 0%,100%{opacity:.18} 50%{opacity:.28} }

  /* Spotlight on idol */
  .spotlight {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 420px; pointer-events: none;
    background: radial-gradient(ellipse at 50% 10%, rgba(255,255,220,0.1) 0%, transparent 70%);
    animation: spotPulse 3s ease-in-out infinite;
  }
  @keyframes spotPulse { 0%,100%{opacity:.8} 50%{opacity:1} }

  /* IDOL CHARACTER */
  .idol-stage {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 160px; display: flex; flex-direction: column; align-items: center;
  }
  .idol-figure {
    width: 130px; height: 320px; position: relative;
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* Walking animation */
  .idol-figure.walking { animation: walk 0.7s ease-in-out infinite alternate; }
  @keyframes walk {
    0% { transform: translateY(0) rotate(-1deg); }
    100% { transform: translateY(-8px) rotate(1deg); }
  }

  /* Photo flash */
  .flash-overlay {
    position: absolute; inset: 0; background: white; opacity: 0;
    pointer-events: none; z-index: 20; border-radius: 18px;
    transition: opacity 0.05s;
  }
  .flash-overlay.flash { animation: flashAnim 0.5s forwards; }
  @keyframes flashAnim { 0%{opacity:.9} 100%{opacity:0} }

  /* NAME TAG */
  .idol-name-tag {
    margin-top: 8px; font-family: 'Playfair Display', serif;
    font-size: 15px; color: var(--gold); letter-spacing: 1px;
  }
  .idol-group-tag {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-top: 2px;
  }

  /* SCORE DISPLAY */
  .score-bar {
    position: absolute; top: 12px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 14px;
  }
  .score-pill {
    font-size: 11px; letter-spacing: 1px; color: var(--gold);
    background: rgba(0,0,0,0.4); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px;
  }

  /* RUNWAY CONTROLS */
  .runway-controls {
    display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap;
  }
  .btn {
    padding: 9px 20px; border-radius: 30px; border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.04); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s; letter-spacing: 0.5px;
  }
  .btn:hover { background: rgba(255,255,255,0.08); border-color: var(--gold); color: var(--gold); }
  .btn.accent {
    background: linear-gradient(135deg, rgba(244,114,182,0.3), rgba(167,139,250,0.3));
    border-color: var(--pink); color: var(--gold2);
  }
  .btn.accent:hover { background: linear-gradient(135deg, rgba(244,114,182,0.5), rgba(167,139,250,0.5)); }
  .btn.photo-btn {
    background: linear-gradient(135deg, rgba(232,201,122,0.25), rgba(245,224,160,0.15));
    border-color: var(--gold); color: var(--gold);
    animation: photoBtnPulse 2s ease-in-out infinite;
  }
  @keyframes photoBtnPulse { 0%,100%{box-shadow:0 0 0 rgba(232,201,122,0)} 50%{box-shadow:0 0 16px rgba(232,201,122,0.4)} }

  /* OUTFIT PANEL */
  .outfit-panel {
    width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px;
    padding-left: 1.5rem;
  }
  .panel-title {
    font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 400;
    color: var(--gold); letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }

  .outfit-category { display: flex; flex-direction: column; gap: 6px; }
  .category-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2px;
  }
  .outfit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .outfit-chip {
    aspect-ratio: 1; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--surface2); cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    transition: all .2s; position: relative; overflow: hidden;
    font-size: 20px;
  }
  .outfit-chip span.chip-label {
    font-size: 8px; letter-spacing: 0.5px; color: var(--muted); font-weight: 500;
    text-align: center; line-height: 1.1; padding: 0 2px;
  }
  .outfit-chip:hover { border-color: var(--violet); transform: scale(1.06); }
  .outfit-chip.selected { border-color: var(--gold); background: rgba(232,201,122,0.12); box-shadow: 0 0 12px rgba(232,201,122,0.25); }
  .outfit-chip.selected::after {
    content: '✓'; position: absolute; top: 2px; right: 4px;
    font-size: 8px; color: var(--gold); font-weight: 700;
  }

  /* COLOR SWATCHES */
  .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all .2s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--white); box-shadow: 0 0 10px rgba(255,255,255,0.4); }

  /* PHOTO GALLERY */
  .gallery-area {
    max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 1.5rem 2rem;
  }
  .gallery-title {
    font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
    border-top: 1px solid var(--border); padding-top: 14px;
  }
  .gallery-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .gallery-thumb {
    width: 120px; height: 160px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface2);
    overflow: hidden; position: relative; cursor: pointer;
    transition: all .2s;
  }
  .gallery-thumb:hover { border-color: var(--gold); transform: scale(1.04); }
  .gallery-thumb canvas { width: 100%; height: 100%; display: block; }
  .gallery-thumb .photo-label {
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
    font-size: 9px; color: var(--gold); letter-spacing: 1px; text-align: center;
    padding: 4px; text-transform: uppercase;
  }
  .gallery-empty {
    font-size: 13px; color: var(--muted); font-style: italic;
    padding: 12px 0;
  }

  /* Reaction popups */
  .reaction {
    position: absolute; pointer-events: none; font-size: 22px; z-index: 30;
    animation: reactAnim 1.5s forwards;
  }
  @keyframes reactAnim {
    0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.4)}
  }

  /* Audience flash */
  .audience-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(180deg, transparent, rgba(167,139,250,0.08));
    display: flex; align-items: center; justify-content: center; gap: 4px;
    overflow: hidden;
  }
  .audience-person {
    width: 8px; height: 14px; border-radius: 4px 4px 2px 2px;
    background: rgba(255,255,255,0.12); position: relative;
  }
  .audience-flash { animation: aud 1.5s ease-in-out infinite; }
  @keyframes aud { 0%,100%{background:rgba(255,255,255,0.12)} 50%{background:rgba(232,201,122,0.5)} }

  /* SVG idol renderer */
  #idol-svg { width: 130px; height: 320px; }
</style>
</head>
<body>
<div id="starfield"></div>
<div class="app">
  <header>
    <p class="logo-tag">★ K-Fashion Runway ★</p>
    <h1>Style &amp; Shine</h1>
    <p><em>Where K-Pop meets Haute Couture</em></p>
  </header>

  <!-- IDOL SELECTOR -->
  <div class="idol-tabs" id="idol-tabs"></div>

  <!-- STAGE + OUTFIT -->
  <div class="stage-area">
    <div class="runway-wrap">
      <div class="runway" id="runway">
        <div class="stage-light left"></div>
        <div class="stage-light right"></div>
        <div class="spotlight"></div>

        <div class="score-bar">
          <div class="score-pill" id="style-score">✦ Style: 0</div>
          <div class="score-pill" id="photo-count">📷 0 Photos</div>
        </div>

        <div class="idol-stage">
          <div class="idol-figure" id="idol-figure">
            <svg id="idol-svg" viewBox="0 0 130 320" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <div class="idol-name-tag" id="idol-name">Minji</div>
          <div class="idol-group-tag" id="idol-group">NewJeans</div>
        </div>

        <div class="runway-floor" id="runway-floor">
          <svg width="340" height="180" style="position:absolute;bottom:0;left:0">
            <defs>
              <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(232,201,122,0.05)"/>
                <stop offset="100%" stop-color="rgba(232,201,122,0.15)"/>
              </linearGradient>
            </defs>
            <rect width="340" height="180" fill="url(#floorGrad)"/>
            <!-- Perspective lines -->
            <line x1="170" y1="0" x2="0" y2="180" stroke="rgba(232,201,122,0.12)" stroke-width="1"/>
            <line x1="170" y1="0" x2="60" y2="180" stroke="rgba(232,201,122,0.08)" stroke-width="1"/>
            <line x1="170" y1="0" x2="120" y2="180" stroke="rgba(232,201,122,0.06)" stroke-width="1"/>
            <line x1="170" y1="0" x2="340" y2="180" stroke="rgba(232,201,122,0.12)" stroke-width="1"/>
            <line x1="170" y1="0" x2="280" y2="180" stroke="rgba(232,201,122,0.08)" stroke-width="1"/>
            <line x1="170" y1="0" x2="220" y2="180" stroke="rgba(232,201,122,0.06)" stroke-width="1"/>
            <!-- Horizontal lines -->
            <line x1="0" y1="60" x2="340" y2="60" stroke="rgba(232,201,122,0.06)" stroke-width="0.5"/>
            <line x1="0" y1="110" x2="340" y2="110" stroke="rgba(232,201,122,0.06)" stroke-width="0.5"/>
            <line x1="0" y1="150" x2="340" y2="150" stroke="rgba(232,201,122,0.08)" stroke-width="0.5"/>
          </svg>
        </div>

        <div class="audience-bar" id="audience-bar"></div>
        <div class="flash-overlay" id="flash-overlay"></div>
      </div>

      <div class="runway-controls">
        <button class="btn" id="walk-btn" onclick="toggleWalk()">▶ Walk the Runway</button>
        <button class="btn accent" onclick="spinIdol()">✦ Pose</button>
        <button class="btn photo-btn" onclick="takePhoto()">📷 Snap Photo</button>
      </div>
    </div>

    <!-- OUTFIT PANEL -->
    <div class="outfit-panel">
      <div class="panel-title">Wardrobe</div>

      <div class="outfit-category">
        <div class="category-label">Top / Outfit</div>
        <div class="outfit-grid" id="top-grid"></div>
      </div>
      <div class="outfit-category">
        <div class="category-label">Bottoms</div>
        <div class="outfit-grid" id="bottom-grid"></div>
      </div>
      <div class="outfit-category">
        <div class="category-label">Accessories</div>
        <div class="outfit-grid" id="acc-grid"></div>
      </div>
      <div class="outfit-category">
        <div class="category-label">Color Palette</div>
        <div class="color-row" id="color-row"></div>
      </div>

      <div class="panel-title" style="margin-top:4px">Mood Score</div>
      <div style="font-size:28px;letter-spacing:4px;color:var(--gold)" id="star-display">☆☆☆☆☆</div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="gallery-area">
    <div class="gallery-title">📸 Look Book</div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-empty">No photos yet — walk the runway and snap your best look!</div>
    </div>
  </div>
</div>

<script>
// STARFIELD
const sf = document.getElementById('starfield');
for(let i=0;i<80;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*5}s`;
  sf.appendChild(s);
}

// DATA
const IDOLS = [
  { name:'Minji',     group:'NewJeans', skin:'#f5c9a0', hair:'#2a1a0e', hairStyle:'long',     male:false },
  { name:'Hanni',     group:'NewJeans', skin:'#e8b98a', hair:'#1a0a0a', hairStyle:'medium',   male:false },
  { name:'Danielle',  group:'NewJeans', skin:'#f0c8b0', hair:'#3d1a00', hairStyle:'wavy',     male:false },
  { name:'Haerin',    group:'NewJeans', skin:'#f2c4a2', hair:'#0a0a0a', hairStyle:'straight', male:false },
  { name:'Hyein',     group:'NewJeans', skin:'#f8d8c0', hair:'#222222', hairStyle:'pigtails', male:false },
  { name:'James',     group:'CORTIS',   skin:'#f2c8a8', hair:'#1a1a1a', hairStyle:'m_short',  male:true  },
  { name:'Keonho',    group:'CORTIS',   skin:'#efc0a0', hair:'#0a0a0a', hairStyle:'m_medium', male:true  },
  { name:'Martin',    group:'CORTIS',   skin:'#f5cdb0', hair:'#2a1500', hairStyle:'m_wavy',   male:true  },
  { name:'Juhoon',    group:'CORTIS',   skin:'#f0c4a2', hair:'#111111', hairStyle:'m_curtain',male:true  },
  { name:'Seonghyeon',group:'CORTIS',   skin:'#f8d0b8', hair:'#222222', hairStyle:'m_slick',  male:true  },
];

const TOPS = [
  {emoji:'👗', label:'Mini Dress', id:'minidress', scoreBonus:3, femaleOnly:true},
  {emoji:'👘', label:'Hanbok Fusion', id:'hanbok', scoreBonus:5, femaleOnly:false},
  {emoji:'🧥', label:'Suit Jacket', id:'suit', scoreBonus:5, maleOnly:true},
  {emoji:'🩱', label:'Bodysuit', id:'bodysuit', scoreBonus:2, femaleOnly:false},
  {emoji:'🦋', label:'Statement Top', id:'butterfly', scoreBonus:4, femaleOnly:false},
  {emoji:'💎', label:'Crystal Outfit', id:'gown', scoreBonus:6, femaleOnly:false},
];
const BOTTOMS = [
  {emoji:'🩳', label:'Mini Skirt', id:'miniskirt', scoreBonus:2, femaleOnly:true},
  {emoji:'👖', label:'Wide Pants', id:'widepants', scoreBonus:2},
  {emoji:'🌸', label:'Floral Skirt', id:'floralskirt', scoreBonus:3, femaleOnly:true},
  {emoji:'⚫', label:'Leather Pants', id:'leather', scoreBonus:3},
  {emoji:'🌊', label:'Maxi Pants', id:'maxiskirt', scoreBonus:4},
  {emoji:'🎽', label:'Cargo Pants', id:'cargo', scoreBonus:3, maleOnly:true},
];
const ACCS = [
  {emoji:'👑', label:'Crown', id:'crown', scoreBonus:4},
  {emoji:'🌸', label:'Flower Pin', id:'flowers', scoreBonus:3},
  {emoji:'💍', label:'Jewels', id:'jewels', scoreBonus:3},
  {emoji:'🕶️', label:'Shades', id:'shades', scoreBonus:2},
  {emoji:'🎀', label:'Ribbon', id:'bow', scoreBonus:2},
  {emoji:'🌟', label:'Star Pins', id:'starpins', scoreBonus:3},
];
const COLORS = [
  {hex:'#f472b6', name:'Rose Pink'},
  {hex:'#a78bfa', name:'Lavender'},
  {hex:'#6ee7b7', name:'Mint'},
  {hex:'#fbbf24', name:'Gold'},
  {hex:'#f87171', name:'Coral'},
  {hex:'#60a5fa', name:'Sky Blue'},
  {hex:'#ffffff', name:'Snow White'},
  {hex:'#1e1b4b', name:'Midnight'},
  {hex:'#064e3b', name:'Forest'},
  {hex:'#7f1d1d', name:'Deep Red'},
];

let state = {
  idol: 0,
  top: 'minidress',
  bottom: 'widepants',
  acc: 'flowers',
  color: '#f472b6',
  walking: false,
  score: 0,
  photos: [],
  photoCount: 0,
  stars: 0,
};

// BUILD TABS
const idolTabsEl = document.getElementById('idol-tabs');
IDOLS.forEach((idol, i) => {
  const btn = document.createElement('button');
  btn.className = 'idol-tab' + (i===0?' active':'');
  btn.textContent = `${idol.name} · ${idol.group}`;
  btn.onclick = () => selectIdol(i);
  idolTabsEl.appendChild(btn);
});

// BUILD OUTFIT GRIDS
function buildGrid(items, containerId, category) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'outfit-chip' + (state[category]===item.id?' selected':'');
    chip.innerHTML = `<span style="font-size:22px">${item.emoji}</span><span class="chip-label">${item.label}</span>`;
    chip.onclick = () => selectOutfit(category, item.id, grid, chip);
    chip.dataset.id = item.id;
    grid.appendChild(chip);
  });
}

function buildColors() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (state.color===c.hex?' selected':'');
    sw.style.background = c.hex;
    sw.title = c.name;
    sw.onclick = () => {
      state.color = c.hex;

function selectIdol(i) {
  state.idol = i;
  const idol = IDOLS[i];
  // Reset to gender-appropriate defaults
  if(idol.male) {
    state.top = 'suit';
    state.bottom = 'widepants';
  } else {
    state.top = 'minidress';
    state.bottom = 'miniskirt';
  }
  state.acc = 'flowers';
  document.querySelectorAll('.idol-tab').forEach((t,j) => t.classList.toggle('active', j===i));
  document.getElementById('idol-name').textContent = idol.name;
  document.getElementById('idol-group').textContent = idol.group;
  // Rebuild grids to reflect gender
  buildGrid(TOPS, 'top-grid', 'top');

  buildGrid(ACCS, 'acc-grid', 'acc');
  drawIdol();
  spawnReaction();

// SCORE
function updateScore() {
  const topItem = TOPS.find(t => t.id === state.top);
  const botItem = BOTTOMS.find(b => b.id === state.bottom);
  const accItem = ACCS.find(a => a.id === state.acc);
  const bonus = (topItem?.scoreBonus||0) + (botItem?.scoreBonus||0) + (accItem?.scoreBonus||0);
  state.stars = Math.min(5, Math.floor(bonus / 3.5));
  state.score += bonus;
  document.getElementById('style-score').textContent = `✦ Style: ${state.score}`;
  const stars = '★'.repeat(state.stars) + '☆'.repeat(5 - state.stars);
  document.getElementById('star-display').textContent = stars;
}

// HELPERS
function lighten(hex, pct) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+pct*2.5|0); g=Math.min(255,g+pct*2.5|0); b=Math.min(255,b+pct*2.5|0);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function darken(hex, pct) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-pct*2|0); g=Math.max(0,g-pct*2|0); b=Math.max(0,b-pct*2|0);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// WALK
let walkInterval = null;
function toggleWalk() {
  const fig = document.getElementById('idol-figure');
  const btn = document.getElementById('walk-btn');
  state.walking = !state.walking;
  if(state.walking){
    fig.classList.add('walking');
    btn.textContent = '⏹ Stop Walking';
    updateScore();
  } else {
    fig.classList.remove('walking');
    btn.textContent = '▶ Walk the Runway';
  }
}

function spinIdol() {
  const fig = document.getElementById('idol-figure');
  fig.style.transform = 'scaleX(-1)';
  spawnReaction();
  setTimeout(() => { fig.style.transform = 'scaleX(1)'; }, 600);
  updateScore();
}

function spawnReaction() {
  const runway = document.getElementById('runway');
  const reactions = ['💖','✨','⭐','🌸','💫','🎉','💎','👑','🌟','💕'];
  const r = document.createElement('div');
  r.className = 'reaction';
  r.textContent = reactions[Math.floor(Math.random()*reactions.length)];
  r.style.left = (80 + Math.random()*180) + 'px';
  r.style.bottom = (100 + Math.random()*200) + 'px';
  runway.appendChild(r);
  setTimeout(() => r.remove(), 1600);
}

// PHOTO
function takePhoto() {
  const flash = document.getElementById('flash-overlay');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 600);

  // Capture current state into a gallery entry
  state.photoCount++;
  document.getElementById('photo-count').textContent = `📷 ${state.photoCount} Photos`;

  const idol = IDOLS[state.idol];
  const topItem = TOPS.find(t => t.id === state.top);
  const accItem = ACCS.find(a => a.id === state.acc);

  addToGallery({
    idol: idol.name,
    group: idol.group,
    outfit: topItem?.emoji + ' ' + accItem?.emoji,
    color: state.color,
    score: state.stars,
    svgContent: document.getElementById('idol-svg').outerHTML,
  });

  spawnReaction();
  updateScore();
}

  thumb.className = 'gallery-thumb';
  thumb.innerHTML = `
    <div style="width:100%;height:calc(100% - 22px);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,${snapshot.color}22,#1a1a2e);overflow:hidden;padding:4px">
      <div style="transform:scale(0.6);transform-origin:top center;width:130px">
        ${snapshot.svgContent}
      </div>
    </div>
    <div class="photo-label">${snapshot.idol} ${'★'.repeat(snapshot.score)}</div>
  `;
  grid.appendChild(thumb);
}

// INIT
function init() {
  buildGrid(TOPS, 'top-grid', 'top');
  buildGrid(BOTTOMS, 'bottom-grid', 'bottom');
  buildGrid(ACCS, 'acc-grid', 'acc');
  buildColors();
  drawIdol();
  updateScore();

  // Auto reactions
  setInterval(() => {
    if(state.walking) spawnReaction();
  }, 1200);
}

init();
</script>
</body>
</html>
